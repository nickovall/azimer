    NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iamdwc2p5ZnRkcmhhZmFwd3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzMyNTUsImV4cCI6MjA5NTE0OTI1NX0.G3SjDMrYLhRPw_WboewcBMvBunMx89TS9X_mAlkvdXw
