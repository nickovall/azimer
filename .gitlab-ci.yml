stages:
  - pages
  - edge_functions

pages:
  stage: pages
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline --no-audit
    - npm run gen:catalog
    - npm run test:calculator
    - npm run typecheck
    - npm run build
    - rm -rf public
    - mv out public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

edge_functions:
  stage: edge_functions
  allow_failure: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline --no-audit
    - npm run gen:catalog
    - npm run build:bot-bundle
    - npx supabase functions deploy telegram-bot admin-api submit-lead --no-verify-jwt --project-ref objgpsjyftdrhafapwvw
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $SUPABASE_ACCESS_TOKEN'
